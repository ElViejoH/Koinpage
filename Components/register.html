<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Registro de usuarios en Koin.">
    <title>Registrarse | Koin</title>
    <link rel="stylesheet" href="../css/styles.css">
  </head>
  <body class="auth-page" data-page="register">
    <a class="skip-link" href="#contenido-principal">Saltar al contenido principal</a>

    <main id="contenido-principal" class="auth-main">
      <div class="auth-wrapper">
        <a class="back-link" href="../index.html" aria-label="Volver al inicio">
          &larr; Volver al inicio
        </a>

        <section class="auth-card" aria-labelledby="register-title">
          <h1 id="register-title">Registrate</h1>
          <p class="auth-subtitle">Crea tu cuenta para comenzar a gestionar tus finanzas</p>

          <form id="register-form" class="auth-form" data-auth-form novalidate>
            <div class="form-field">
              <label for="register-name">Nombre completo</label>
              <input
                id="register-name"
                name="name"
                type="text"
                autocomplete="name"
                minlength="3"
                placeholder="Tu nombre"
                required
              >
            </div>

            <div class="form-field">
              <label for="register-email">Email</label>
              <input
                id="register-email"
                name="email"
                type="email"
                autocomplete="email"
                placeholder="tu@email.com"
                required
                pattern="^[^@\s]+@[^@\s]+\.[^@\s]+$"
              >
            </div>

            <div class="form-field">
              <label for="register-password">Contrasena</label>
              <input
                id="register-password"
                name="password"
                type="password"
                autocomplete="new-password"
                minlength="6"
                placeholder="Minimo 6 caracteres"
                required
              >
            </div>

            <div class="form-field">
              <label for="register-password-confirm">Confirmar contrasena</label>
              <input
                id="register-password-confirm"
                name="passwordConfirm"
                type="password"
                autocomplete="new-password"
                minlength="6"
                placeholder="Repite tu contrasena"
                required
              >
            </div>

            <button class="btn btn-primary btn-full" type="submit">
              Crear Cuenta
            </button>

            <p id="register-message" class="form-message" role="status" aria-live="polite"></p>
          </form>

          <p class="auth-switch">
            Ya tienes cuenta?
            <a href="login.html">Inicia sesion</a>
          </p>
        </section>
      </div>
    </main>

    <script src="../js/config.js"></script>
    <script src="../js/storage-utils.js"></script>
    <script src="../js/notices.js"></script>
    <script src="../js/auth-shared.js"></script>
    <script src="../js/session-routing.js"></script>
    <script src="../js/dashboard-rendering.js"></script>
    <script src="../js/budgets-members-render.js"></script>
    <script src="../js/transactions-view.js"></script>
    <script src="../js/page-initializers.js"></script>
    <script src="../js/app.js"></script>
  </body>
</html>
