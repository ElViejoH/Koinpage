<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Inicia sesion en Koin.">
    <title>Iniciar Sesion | Koin</title>
    <link rel="stylesheet" href="../css/styles.css">
  </head>
  <body class="auth-page" data-page="login">
    <a class="skip-link" href="#contenido-principal">Saltar al contenido principal</a>

    <main id="contenido-principal" class="auth-main">
      <div class="auth-wrapper">
        <a class="back-link" href="../index.html" aria-label="Volver al inicio">
          &larr; Volver al inicio
        </a>

        <section class="auth-card" aria-labelledby="login-title">
          <h1 id="login-title">Iniciar Sesion</h1>
          <p class="auth-subtitle">Accede a tu cuenta de finanzas familiares</p>

          <form id="login-form" class="auth-form" data-auth-form novalidate>
            <div class="form-field">
              <label for="login-email">Email</label>
              <input
                id="login-email"
                name="email"
                type="email"
                autocomplete="email"
                placeholder="tu@email.com"
                required
                pattern="^[^@\s]+@[^@\s]+\.[^@\s]+$"
              >
            </div>

            <div class="form-field">
              <label for="login-password">Contrasena</label>
              <input
                id="login-password"
                name="password"
                type="password"
                autocomplete="current-password"
                minlength="6"
                placeholder="******"
                required
              >
            </div>

            <button class="btn btn-primary btn-full" type="submit">
              Iniciar Sesion
            </button>

            <p id="login-message" class="form-message" role="status" aria-live="polite"></p>
          </form>

          <p class="auth-switch">
            No tienes cuenta?
            <a href="register.html">Registrate</a>
          </p>
        </section>
      </div>
    </main>

    <script src="../js/runtime-config.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/storage-utils.js"></script>
    <script src="../js/notices.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth-shared.js"></script>
    <script src="../js/session-routing.js"></script>
    <script src="../js/dashboard-rendering.js"></script>
    <script src="../js/budgets-members-render.js"></script>
    <script src="../js/transactions-view.js"></script>
    <script src="../js/page-initializers.js"></script>
    <script src="../js/app.js"></script>
  </body>
</html>
