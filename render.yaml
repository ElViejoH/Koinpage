services:
  - type: web
    name: koin-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: require
      - key: FRONTEND_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
